<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!--
    P0 mark — inspired by the circular P logo reference.
    Three strokes:
      1. Outer ring (≈330° arc, 30° gap at lower-right ≈ 3:30–4:30 o'clock)
         — forms the "0" and the outer bowl of the P
      2. Vertical stem (left of centre, top-to-bottom of circle)
         — the P's spine
      3. Inner bowl arc (semicircle, top-of-stem → mid-stem, curving right)
         — closes the P counter
  -->

  <!-- 1. Outer ring -->
  <path d="M 79.7,79.7 A 42,42 0 1,1 90.6,60.9"
        stroke="#6c8ef5" stroke-width="9.5" stroke-linecap="round"/>

  <!-- 2. P stem -->
  <line x1="36" y1="10" x2="36" y2="90"
        stroke="#6c8ef5" stroke-width="9.5" stroke-linecap="round"/>

  <!-- 3. P inner bowl (exact semicircle: diameter = 42, radius = 21) -->
  <path d="M 36,10 A 21,21 0 0,1 36,52"
        stroke="#6c8ef5" stroke-width="9.5" stroke-linecap="round"/>
</svg>
