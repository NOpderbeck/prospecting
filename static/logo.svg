<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#111827"/>

  <!-- Subtle sweep wedge (NE quadrant) -->
  <path d="M50,50 L78.3,21.7 A40,40 0 0,1 90,50 Z" fill="#4d8bf5" opacity="0.10"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="40" stroke="#4d8bf5" stroke-width="3.5" fill="none"/>

  <!-- Inner ring -->
  <circle cx="50" cy="50" r="22" stroke="#4d8bf5" stroke-width="2" fill="none" opacity="0.45"/>

  <!-- Cardinal tick marks (N / S / W / E) -->
  <line x1="50" y1="10"  x2="50" y2="24"  stroke="#4d8bf5" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="50" y1="76"  x2="50" y2="90"  stroke="#4d8bf5" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="10" y1="50"  x2="24" y2="50"  stroke="#4d8bf5" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="76" y1="50"  x2="90" y2="50"  stroke="#4d8bf5" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Center origin dot -->
  <circle cx="50" cy="50" r="4.5" fill="#4d8bf5"/>

  <!-- Ping dot — upper-right, sitting on outer ring at 45° -->
  <!-- 50 + 40·cos(−45°) ≈ 78, 50 − 40·sin(45°) ≈ 22 -->
  <circle cx="78" cy="22" r="6"   fill="#38bdf8"/>
  <circle cx="78" cy="22" r="10"  stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.35"/>
</svg>
