{% extends "base.html" %}
{% block title %}Run Script — Prospecting Toolkit{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Run Script</h2>
  <p>Launch a script and watch the output stream live</p>
</div>

<!-- Script selector -->
<div class="script-cards" id="script-cards">
  {% for key, meta in script_meta.items() %}
  <button
    class="script-card {% if prefill_script == key %}selected{% endif %}"
    onclick="selectScript('{{ key }}')"
    data-script="{{ key }}"
    data-no-company="{{ 'true' if meta.get('no_company') else 'false' }}"
    type="button"
  >
    <span class="script-icon">{{ meta.icon }}</span>
    <span class="script-name">{{ meta.label }}</span>
    <span class="script-desc">{{ meta.description }}</span>
  </button>
  {% endfor %}
</div>

<!-- Options form -->
<div class="ask-form-wrap">
  <form id="run-form" onsubmit="startRun(event)">
    <input type="hidden" id="selected-script" value="{{ prefill_script }}"/>

    <!-- Company row — hidden for meeting_prep -->
    <div class="form-row" id="company-row">
      <div class="form-group">
        <label for="company-input">Company name</label>
        <input
          class="form-control"
          id="company-input"
          type="text"
          placeholder="e.g. Deloitte"
          value="{{ prefill_company }}"
        />
      </div>
      <div class="form-group" id="domain-group">
        <label for="domain-input">Domain <span style="color:var(--muted);font-weight:400;">(optional)</span></label>
        <input
          class="form-control"
          id="domain-input"
          type="text"
          placeholder="e.g. deloitte.com"
        />
      </div>
    </div>

    <!-- Meeting prep options — shown only for meeting_prep -->
    <div class="form-row" id="meeting-prep-row" style="display:none;">
      <div class="form-group">
        <label for="days-select">Look-ahead window</label>
        <select class="form-control" id="days-select">
          <!-- populated dynamically by buildDaysOptions() -->
        </select>
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:2px;">
        <div class="checkbox-group">
          <input type="checkbox" id="email-check"/>
          <label for="email-check">Email output when done</label>
        </div>
      </div>
    </div>

    <div class="form-row" id="extra-options">
      <!-- Lookup extras -->
      <div id="opt-news" style="display:none;" class="checkbox-group">
        <input type="checkbox" id="news-check"/>
        <label for="news-check">Include recent news (You.com)</label>
      </div>
      <!-- Score extras -->
      <div id="opt-url" style="display:none;" class="form-group">
        <label for="url-input">Company URL <span style="color:var(--muted);font-weight:400;">(optional, score only)</span></label>
        <input class="form-control" id="url-input" type="text" placeholder="company.com"/>
      </div>
      <!-- Bulk Score extras -->
      <div id="opt-bulk-score" style="display:none;">
        <div class="form-group">
          <label for="sheet-url-input">Google Sheet URL</label>
          <input class="form-control" id="sheet-url-input" type="text" placeholder="https://docs.google.com/spreadsheets/d/..."/>
        </div>
        <div class="form-group" style="margin-top:10px;">
          <label for="limit-select">Limit</label>
          <select class="form-control" id="limit-select" style="max-width:140px;">
            <option value="5">5 accounts</option>
            <option value="10">10 accounts</option>
            <option value="25" selected>25 accounts</option>
            <option value="100">100 accounts</option>
            <option value="0">All</option>
          </select>
        </div>
      </div>
      <!-- Verbose -->
      <div class="checkbox-group">
        <input type="checkbox" id="verbose-check"/>
        <label for="verbose-check">Verbose output</label>
      </div>
    </div>

    <div style="margin-top:20px;display:flex;gap:10px;align-items:center;">
      <button class="btn btn-primary" type="submit" id="run-btn">▶ Run</button>
      <button class="btn btn-ghost" type="button" onclick="clearTerminal()">🗑 Clear</button>
      <span id="run-status" class="status-bar"></span>
    </div>
  </form>
</div>

<!-- Terminal -->
<div class="terminal-wrap">
  <div class="terminal-bar">
    <div class="terminal-dot red"></div>
    <div class="terminal-dot yellow"></div>
    <div class="terminal-dot green" id="term-dot-green"></div>
    <span id="term-label" style="margin-left:8px;">Ready</span>
  </div>
  <div id="terminal-output"></div>
</div>

<script>
let currentScript = document.getElementById('selected-script').value || 'lookup';
let evtSource = null;
let streamDone = false;  // guard against onerror firing after clean completion

// ---------------------------------------------------------------------------
// Dynamically build look-ahead options, skipping weekends
// ---------------------------------------------------------------------------
function buildDaysOptions() {
  const sel = document.getElementById('days-select');
  if (!sel) return;

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dow = today.getDay(); // 0=Sun … 6=Sat

  function fmt(d) {
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  // Inclusive calendar-day count from today to target
  function calDays(target) {
    return Math.round((target - today) / 86400000) + 1;
  }

  // Return the Nth weekday counting from today (or next Mon if today is a weekend).
  // n=0 → nearest weekday (today if weekday, else next Mon)
  function nthWeekday(n) {
    let d = new Date(today);
    while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() + 1);
    let count = 0;
    while (count < n) {
      d.setDate(d.getDate() + 1);
      if (d.getDay() !== 0 && d.getDay() !== 6) count++;
    }
    return d;
  }

  // --- Today ---
  const todayOpt = { days: 1, label: `Today — ${fmt(today)}`, name: 'Today' };

  // --- Tomorrow: next weekday ---
  let tmr = new Date(today);
  if      (dow === 5) tmr.setDate(today.getDate() + 3); // Fri → Mon
  else if (dow === 6) tmr.setDate(today.getDate() + 2); // Sat → Mon
  else                tmr.setDate(today.getDate() + 1);
  const tomorrowOpt = { days: calDays(tmr), label: `Tomorrow — ${fmt(tmr)}`, name: 'Tomorrow' };

  // --- Next 3 Days: next 3 weekdays (starts from nearest weekday) ---
  const wd0 = nthWeekday(0);
  const wd2 = nthWeekday(2);
  const next3Opt = {
    days: calDays(wd2),
    label: `Next 3 Days — ${fmt(wd0)} – ${fmt(wd2)}`,
    name: 'Next 3 Days',
  };

  // --- This Week: today (or next Mon if weekend) through Friday ---
  let wkStart, wkEnd;
  if (dow === 0 || dow === 6) {
    wkStart = nthWeekday(0);
    wkEnd = new Date(wkStart); wkEnd.setDate(wkStart.getDate() + 4);
  } else {
    wkStart = new Date(today);
    wkEnd = new Date(today); wkEnd.setDate(today.getDate() + (5 - dow));
  }
  const thisWeekOpt = {
    days: calDays(wkEnd),
    label: `This Week — ${fmt(wkStart)} – ${fmt(wkEnd)}`,
    name: 'This Week',
  };

  sel.innerHTML = '';
  [todayOpt, tomorrowOpt, next3Opt, thisWeekOpt].forEach(opt => {
    const el = document.createElement('option');
    el.value = opt.days;
    el.textContent = opt.label;
    el.dataset.name = opt.name;
    sel.appendChild(el);
  });
}

function selectScript(key) {
  currentScript = key;
  document.getElementById('selected-script').value = key;
  document.querySelectorAll('.script-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`[data-script="${key}"]`).classList.add('selected');

  const isMeetingPrep = key === 'meeting_prep';
  const isBulkScore   = key === 'bulk_score';
  const noCompany     = isMeetingPrep || isBulkScore;

  // Toggle company row vs meeting-prep row vs bulk-score row
  document.getElementById('company-row').style.display      = noCompany      ? 'none'  : 'grid';
  document.getElementById('meeting-prep-row').style.display = isMeetingPrep  ? 'grid'  : 'none';

  // Show/hide account-script extras
  document.getElementById('opt-news').style.display       = key === 'lookup'     ? 'flex'  : 'none';
  document.getElementById('opt-url').style.display        = key === 'score'      ? 'block' : 'none';
  document.getElementById('opt-bulk-score').style.display = key === 'bulk_score' ? 'block' : 'none';
  document.getElementById('domain-group').style.display   = (key === 'lookup' || key === 'prospect') ? 'block' : 'none';
}

// Init on load
buildDaysOptions();
selectScript(currentScript);

function clearTerminal() {
  document.getElementById('terminal-output').innerHTML = '';
  document.getElementById('run-status').innerHTML = '';
  document.getElementById('term-label').textContent = 'Ready';
}

function appendLine(text, cls) {
  const el = document.getElementById('terminal-output');
  const line = document.createElement('div');
  line.className = cls || 'term-line-out';
  line.textContent = text;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function startRun(e) {
  e.preventDefault();
  if (evtSource) { evtSource.close(); }
  streamDone = false;

  const script  = currentScript;
  const verbose = document.getElementById('verbose-check').checked;

  let params;
  let termLabel;

  if (script === 'meeting_prep') {
    const daysEl = document.getElementById('days-select');
    const days   = daysEl.value;
    const daysName = daysEl.options[daysEl.selectedIndex]?.dataset?.name || days;
    const email  = document.getElementById('email-check').checked;
    params = new URLSearchParams({
      script, days,
      email:   email   ? 'true' : '',
      verbose: verbose ? 'true' : '',
    });
    termLabel = `Meeting Prep — ${daysName}`;
  } else if (script === 'bulk_score') {
    const sheetUrl = document.getElementById('sheet-url-input').value.trim();
    if (!sheetUrl) { alert('Please enter a Google Sheet URL.'); return; }
    const limit = document.getElementById('limit-select').value;
    const limitLabel = limit === '0' ? 'All' : limit;
    params = new URLSearchParams({
      script,
      sheet_url: sheetUrl,
      limit,
      verbose: verbose ? 'true' : '',
    });
    termLabel = `Bulk Fit Score — ${limitLabel} accounts`;
  } else {
    const company = document.getElementById('company-input').value.trim();
    const domain  = document.getElementById('domain-input').value.trim();
    const news    = document.getElementById('news-check').checked;
    let url = document.getElementById('url-input').value.trim();
    if (url && !/^https?:\/\//i.test(url)) url = 'https://' + url;

    if (!company) { alert('Please enter a company name.'); return; }

    params = new URLSearchParams({
      company, script, domain,
      news:    news    ? 'true' : '',
      url:     url,
      verbose: verbose ? 'true' : '',
    });
    termLabel = `${script} — ${company}`;
  }

  clearTerminal();

  document.getElementById('run-status').innerHTML =
    '<span class="spinner"></span><span class="status-running">Running…</span>';
  document.getElementById('term-label').textContent = termLabel;
  document.getElementById('run-btn').disabled = true;

  evtSource = new EventSource(`/run/stream?${params}`);

  evtSource.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.done) {
      streamDone = true;
      evtSource.close();
      document.getElementById('run-btn').disabled = false;
      const ok = data.exit_code === 0;
      document.getElementById('run-status').innerHTML = ok
        ? '<span class="status-ok">✓ Completed</span>'
        : `<span class="status-error">✗ Exited with code ${data.exit_code}</span>`;
      if (data.line) appendLine(data.line, 'term-line-out');
      if (data.report_url) {
        const el = document.getElementById('terminal-output');
        const div = document.createElement('div');
        div.className = 'term-line-ok term-report-link';
        div.innerHTML = `📄 Report ready &mdash; <a href="${data.report_url}">View report</a>`;
        el.appendChild(div);
        el.scrollTop = el.scrollHeight;
      }
      return;
    }
    const line = data.line || '';
    let cls = 'term-line-out';
    if (line.startsWith('ERROR') || line.toLowerCase().includes('error:')) cls = 'term-line-err';
    else if (line.startsWith('---') || line.startsWith('===') || line.startsWith('##')) cls = 'term-line-hdr';
    else if (line.toLowerCase().includes('✓') || line.toLowerCase().includes('done') || line.toLowerCase().includes('saved')) cls = 'term-line-ok';
    appendLine(line, cls);
  };

  evtSource.onerror = () => {
    // EventSource fires onerror when the server closes the connection, even
    // after a clean finish.  Guard so a successful run is never overwritten.
    if (streamDone) return;
    evtSource.close();
    document.getElementById('run-btn').disabled = false;
    document.getElementById('run-status').innerHTML = '<span class="status-error">✗ Stream error</span>';
  };
}
</script>
{% endblock %}
