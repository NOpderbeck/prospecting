{# Full action items list — re-rendered by add/delete/extract operations #}
<div id="action-list-wrap">
  {% if extract_msg %}
  <div class="extract-status {% if extract_ok %}ok{% else %}neutral{% endif %}">
    {{ extract_msg }}
  </div>
  {% endif %}
  {% if actions %}
  <ul class="action-list">
    {% for item in actions %}
    {% include "_action_row.html" %}
    {% endfor %}
  </ul>
  {% else %}
  <p class="action-empty">No action items yet. Add one below.</p>
  {% endif %}
</div>
