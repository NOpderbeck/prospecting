<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}P0{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <a href="/" class="logo-link">
        <svg class="logo-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" aria-hidden="true">
          <path d="M 79.7,79.7 A 42,42 0 1,1 90.6,60.9"
                stroke="currentColor" stroke-width="9.5" stroke-linecap="round"/>
          <line x1="36" y1="10" x2="36" y2="90"
                stroke="currentColor" stroke-width="9.5" stroke-linecap="round"/>
          <path d="M 36,10 A 21,21 0 0,1 36,52"
                stroke="currentColor" stroke-width="9.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-wordmark">P0</span>
      </a>
      <p class="logo-sub">Sales Toolkit</p>
    </div>
    <nav>
      <a href="/" class="{% if active == 'dashboard' %}active{% endif %}">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a href="/run" class="{% if active == 'run' %}active{% endif %}">
        <span class="nav-icon">▶️</span> Run Script
      </a>
      <a href="/accounts" class="{% if active == 'accounts' %}active{% endif %}">
        <span class="nav-icon">📋</span> Accounts
      </a>
      <a href="/tasks" class="{% if active == 'tasks' %}active{% endif %}">
        <span class="nav-icon">✅</span> Tasks
      </a>
      <a href="/ask" class="{% if active == 'ask' %}active{% endif %}">
        <span class="nav-icon">💬</span> Ask a Question
      </a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>

<!-- ── Confirmation Modal ─────────────────────────────── -->
<div id="confirm-modal" class="modal-backdrop" aria-hidden="true">
  <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <p id="modal-title" class="modal-msg"></p>
    <div class="modal-actions">
      <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
      <button id="modal-ok"     class="btn btn-danger">Delete</button>
    </div>
  </div>
</div>

<script>
(function () {
  var backdrop  = document.getElementById('confirm-modal');
  var msgEl     = document.getElementById('modal-title');
  var okBtn     = document.getElementById('modal-ok');
  var cancelBtn = document.getElementById('modal-cancel');
  var _resolve  = null;

  function openModal(message) {
    msgEl.textContent = message;
    backdrop.classList.add('modal-open');
    backdrop.setAttribute('aria-hidden', 'false');
    okBtn.focus();
  }

  function closeModal() {
    backdrop.classList.remove('modal-open');
    backdrop.setAttribute('aria-hidden', 'true');
    _resolve = null;
  }

  okBtn.addEventListener('click', function () {
    if (_resolve) _resolve(true);
    closeModal();
  });

  cancelBtn.addEventListener('click', closeModal);

  backdrop.addEventListener('click', function (e) {
    if (e.target === backdrop) closeModal();
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeModal();
  });

  // Replace browser window.confirm() for every hx-confirm on the page
  document.body.addEventListener('htmx:confirm', function (e) {
    if (!e.detail.question) return;  // no hx-confirm on this element — let HTMX proceed
    e.preventDefault();
    openModal(e.detail.question);
    _resolve = function (confirmed) {
      if (confirmed) e.detail.issueRequest(true);
    };
  });
})();
</script>
</body>
</html>
